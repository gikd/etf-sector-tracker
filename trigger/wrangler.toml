name = "etf-trigger"
main = "worker.js"
compatibility_date = "2025-01-01"

# 모든 시각은 UTC. 한국(KST)은 서머타임 없음, 미국은 서머/윈터 둘 다 발사한다.
# 개장/마감 '직후'(+5분)에 쏴서 그날 일봉(시가·종가)이 확실히 잡히게 한다.
[triggers]
crons = [
  "5 0-6 * * 1-5",     # 한국장(09~15 KST = 00~06 UTC) 매시 05분 — 개장 00:05 포함
  "35 6 * * 1-5",      # 한국장 마감 직후 15:35 KST (06:35 UTC)
  "5 13-21 * * 1-5",   # 미국장(13~21 UTC) 매시 05분 — 마감 20:05/21:05 포함
  "35 13,14 * * 1-5",  # 미국장 개장 직후 09:35 ET (서머 13:35 / 윈터 14:35 UTC)
]
