name = "etf-trigger"
main = "worker.js"
compatibility_date = "2025-01-01"

# 모든 시각은 UTC. 한국(KST)은 서머타임 없음, 미국은 서머/윈터 둘 다 발사한다.
# 개장/마감 '직후'(+5분)에 쏴서 그날 일봉(시가·종가)이 확실히 잡히게 한다.
[triggers]
crons = [
  "5 0-6 * * 1-5",     # 한국장(09:00~15:30 KST = 00:00~06:30 UTC) 매시 05분
  "5 13-21 * * 1-5",   # 미국장(서머 13:30~20:00 / 윈터 14:30~21:00 UTC) 매시 05분
]
