<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>핵심 태제 트래킹</title>
<script>document.documentElement.className=(function(){try{return localStorage.getItem("etf-theme")||"theme-dark"}catch(e){return "theme-dark"}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&family=Nanum+Myeongjo:wght@400;700;800&family=Staatliches&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  /* perspective 전용 컴포넌트 (공통은 theme.css) — 색·구조는 변수로 구동 */
  .weeks { margin:4px 0 22px; }
  #krtoggle { margin-left:auto; font-family:var(--mono); font-size:12px; }
  .kr-label { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; color:var(--muted);
    text-transform:uppercase; margin:12px 0 7px; padding-top:11px; border-top:1px solid var(--line); }

  /* 관련 ETF 자동매칭 */
  .rel-label { font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:var(--muted);
    text-transform:uppercase; margin:14px 0 7px; padding-top:11px; border-top:1px dashed var(--line-strong); }
  .rel-hint { text-transform:none; letter-spacing:0; opacity:.7; font-family:var(--sans); margin-left:6px; }
  .rel-grid { display:grid; gap:7px; grid-template-columns:repeat(auto-fill,minmax(184px,1fr)); }
  .rel-etf { background:var(--card); border:1px dashed var(--line-strong); border-radius:var(--card-radius);
    padding:8px 11px; cursor:pointer; transition:border-color .12s, background .12s; }
  .rel-etf:hover { background:var(--card-hover); border-color:var(--clay); }
  .re-top { display:flex; justify-content:space-between; align-items:baseline; gap:6px; }
  .re-nm { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .re-ret { font-weight:700; font-size:12px; font-variant-numeric:tabular-nums; flex-shrink:0; }
  .re-sub { font-size:10.5px; color:var(--muted); margin-top:3px; }
  .re-mkt { font-family:var(--mono); }

  .src-link { color:var(--clay); font-weight:700; text-decoration:none; border-bottom:1px solid transparent; }
  .src-link:hover { border-bottom-color:var(--clay); }

  /* 테제 섹션 */
  .thesis { margin-bottom:34px; }
  .th-head { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:30px 0 7px;
    padding-top:16px; border-top:1px solid var(--line); }
  .th-head h2 { font-size:22px; font-weight:800; letter-spacing:-.025em;
    margin:0; padding:0; border:0; text-transform:none; }
  .th-head h2::before { display:none; }
  .th-num { color:var(--clay); font-size:13px; font-weight:700; }
  .th-summary { font-family:var(--serif); font-size:16px; line-height:1.95; color:var(--ink); margin:4px 0 10px; max-width:800px; }

  /* 종목 카드 */
  .grid { display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(178px,1fr)); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:var(--card-radius);
    padding:12px 13px 11px; cursor:pointer; transition:border-color .1s, background .1s; }
  .card:hover { background:var(--card-hover); border-color:var(--line-strong); }
  .card.etf { border-style:dashed; }
  .card.etf .etf-tag { color:var(--clay); font-weight:600; }
  .c-top { display:flex; justify-content:space-between; align-items:baseline; gap:6px; }
  .card .nm { font-weight:700; font-size:14.5px; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card .today { font-family:var(--mono); font-size:12.5px; font-weight:600; flex-shrink:0; font-variant-numeric:tabular-nums; }
  .card .tk { font-family:var(--mono); font-size:10.5px; color:var(--muted); margin-top:2px; }
  .card svg { display:block; width:100%; height:36px; margin:9px 0; }
  .c-px { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--ink); }
  .c-per { font-family:var(--mono); font-size:11.5px; color:var(--muted); margin-top:3px; }
  .c-per .pl { font-family:var(--sans); font-size:10px; }
  .c-per b { color:var(--clay); font-weight:600; }
  .c-per .dot { opacity:.4; margin:0 2px; }
</style>
</head>
<body>
<div class="nav">
  <a href="index.html">섹터 대시보드</a>
  <a href="megacap.html">글로벌 메가캡</a>
  <a href="perspective.html" class="cur">핵심 태제 트래킹</a>
</div>
<div class="kicker">주간복기 · 핵심 테제 트래킹</div>
<header>
  <h1>핵심 태제 트래킹</h1>
  <span class="updated" id="updated"></span>
</header>
<p class="note">
  주간복기 주차별 핵심 테제와, 각 테제에 맞는 종목을 봅니다.
  카드 클릭 = 일봉 차트 + 뉴스 상세. 유료 본문 미노출 · 관측용이며 투자 권유가 아닙니다.
</p>
<div class="weeks" id="weeks"></div>
<div id="board"></div>
<footer>
  종목 데이터: 글로벌 메가캡(시총 TOP300)에서 매칭. 테제는 주간복기 관점의 짧은 요약이며 원문이 아닙니다.
</footer>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>

<script src="theme.js"></script>
<script src="capture.js"></script>
<script src="stocks-common.js"></script>
<script>
let STOCKS = {}, THESES = null, curWeek = 0;
let PRICE_UPDATED = "";  // megacap.json 의 시세 갱신 시각(메가캡 페이지와 동일 소스)
let showKr = false;
try { showKr = !!localStorage.getItem("showKr"); } catch (e) {}
const byTicker = t => STOCKS[t];

// 주간복기 멤버 사이트 원문 URL — slug = "{YY}-{주차}" (예: 26년 25주차 → 26-25)
const REVIEW_BASE = "https://weekly-review-z8c8.vercel.app/reviews";
function reviewUrl(w) {
  const wk = parseInt(String(w.week), 10);
  const yy = w.date ? w.date.slice(2, 4) : "";
  return (wk && yy) ? `${REVIEW_BASE}/${yy}-${wk}` : null;
}

function card(s) {
  const sp = s.candles ? s.candles.c.slice(-42) : s.spark;
  const sub = s.is_etf
    ? `<div class="c-per"><span class="etf-tag">한국 ETF</span> ${s.theme || ""}</div>`
    : `<div class="c-per"><span class="pl">올해</span> ${s.pe_now != null ? s.pe_now : "–"} <span class="dot">·</span> <span class="pl">내년</span> <b>${s.pe_next != null ? s.pe_next : "–"}</b></div>`;
  return `<div class="card${s.is_etf ? " etf" : ""}" onclick="openModal('${s.ticker}')">
    <div class="c-top"><span class="nm">${s.name}</span><span class="today ${cls(s.r1d)}">${fmt(s.r1d)}</span></div>
    <div class="tk">${s.ticker.replace(".KS", "")}${s.rank ? ` · 시총 ${s.rank}위` : ""}</div>
    ${spark(sp)}
    <div class="c-px">${fmtPx(s.price, s.ccy)}</div>
    ${sub}
  </div>`;
}

/* ── 관련 ETF 자동매칭 (테마 키워드 + 보유종목 겹침) ─────────────── */
let ETF_CANDIDATES = [];
function indexDashEtfs(d) {   // data.json 의 ETF(미국 섹터·지역·테마 + 한국 섹터)를 후보로
  if (!d || !d.etfs) return;
  const dates = d.dates || [];
  for (const e of d.etfs) {
    const enriched = { ...e, is_etf: true, dates, ccy: e.group === "korea" ? "KRW" : "USD" };
    ETF_CANDIDATES.push(enriched);
    if (!STOCKS[e.ticker]) STOCKS[e.ticker] = enriched;   // 모달 클릭용(기존 데이터 우선)
  }
}
const THEMES = [
  ["반도체", ["반도체", "메모리", "HBM", "D램", "디램", "낸드", "파운드리", "웨이퍼"]],
  ["AI·로봇", ["AI", "인공지능", "추론", "GPU", "LLM", "로봇", "휴머노이드", "피지컬", "자율"]],
  ["소프트웨어", ["소프트웨어", "SaaS", "클라우드", "생태계", "개발자", "워크플로우"]],
  ["바이오", ["바이오", "제약", "신약", "헬스케어"]],
  ["방산", ["방산", "국방", "무기", "항공우주"]],
  ["원자력·전력", ["원자력", "원전", "SMR", "전력", "송전"]],
  ["2차전지", ["2차전지", "배터리", "전기차", "양극재", "음극재"]],
  ["자동차", ["자동차", "완성차", "모빌리티"]],
  ["조선", ["조선", "선박", "해양"]],
  ["인터넷", ["인터넷", "이커머스", "광고"]],
  ["금융", ["은행", "금융", "증권", "보험"]],
];
const ETF_THEME = {
  "SMH": "반도체", "BOTZ": "AI·로봇", "IGV": "소프트웨어", "IBB": "바이오", "ITA": "방산", "URA": "원자력·전력", "KWEB": "인터넷",
  "091160.KS": "반도체", "305720.KS": "2차전지", "364980.KS": "2차전지", "091180.KS": "자동차", "091170.KS": "금융",
  "244580.KS": "바이오", "449450.KS": "방산", "466920.KS": "조선", "157500.KS": "인터넷", "442320.KS": "원자력·전력", "445290.KS": "AI·로봇",
};
function themesOf(text) {
  const s = text || "";
  return new Set(THEMES.filter(([k, kws]) => kws.some(w => s.includes(w))).map(([k]) => k));
}
function etfTheme(e) {
  if (ETF_THEME[e.ticker]) return ETF_THEME[e.ticker];
  const t = (e.name || "") + " " + (e.theme || "");
  const m = THEMES.find(([k, kws]) => kws.some(w => t.includes(w)));
  return m ? m[0] : null;
}
// 시장 벤치마크는 메가캡을 다 들고 있어 '보유 겹침'이 무의미 → 제외
const BROAD_ETFS = new Set(["SPY", "ACWI", "EFA", "EEM", "VGK", "069500.KS", "229200.KS"]);
function relatedEtfs(t) {
  const shown = new Set([...(t.tickers || []), ...(t.kr || [])]);
  const th = themesOf((t.title || "") + " " + (t.summary || ""));
  const out = [], seen = new Set();
  // 1차: 대시보드 ETF 42개 — 보유종목 겹침(강한 근거) + 테마
  for (const e of ETF_CANDIDATES) {
    if (shown.has(e.ticker) || BROAD_ETFS.has(e.ticker)) continue;
    const holds = (e.holdings || []).map(h => h.ticker);
    const overlap = (t.tickers || []).filter(tk => holds.includes(tk));
    const et = etfTheme(e);
    const themed = et && th.has(et);
    const score = overlap.length * 2 + (themed ? 1 : 0);
    if (score > 0) { out.push({ e, score, overlap, et: themed ? et : null, amt: Infinity }); seen.add(e.ticker); }
  }
  // 2차: 한국 상장 ETF 풀 전체(~370) — 이름·테마 키워드 매칭, 거래대금 순 랭킹
  const pool = [];
  for (const e of Object.values(STOCKS)) {
    if (!e.is_etf || !e.ticker.endsWith(".KS")) continue;
    if (shown.has(e.ticker) || seen.has(e.ticker) || BROAD_ETFS.has(e.ticker)) continue;
    if (/레버리지|인버스/.test(e.name)) continue;   // 파생형 제외
    const hits = [...themesOf(e.name + " " + (e.theme || ""))].filter(x => th.has(x));
    if (hits.length) pool.push({ e, score: hits.length, overlap: [], et: hits[0], amt: e.amt || 0 });
  }
  // 비슷한 상품 도배 방지: 같은 테마는 거래대금 상위 2개까지만
  pool.sort((a, b) => b.score - a.score || b.amt - a.amt);
  const perTheme = {};
  for (const r of pool) {
    if ((perTheme[r.et] = (perTheme[r.et] || 0) + 1) <= 2) out.push(r);
  }
  return out.sort((a, b) =>
    b.score - a.score || b.overlap.length - a.overlap.length || (b.amt || 0) - (a.amt || 0)
  ).slice(0, 8);
}
function relCard(r) {
  const e = r.e;
  const why = r.overlap.length
    ? "보유 " + r.overlap.slice(0, 2).map(tk => (STOCKS[tk] && STOCKS[tk].name) || tk.replace(".KS", "")).join("·") + (r.overlap.length > 2 ? " 외" : "")
    : (r.et ? "테마 " + r.et : "");
  const mkt = { us_sector: "미국 섹터", region: "지역 ETF", theme: "테마 ETF", korea: "한국 ETF" }[e.group]
    || (e.ticker.endsWith(".KS") ? "한국 ETF" : "미국 ETF");
  return `<div class="rel-etf" onclick="openModal('${e.ticker}')" title="${e.name}">
    <div class="re-top"><span class="re-nm">${e.name}</span><span class="re-ret ${cls(e.r1w)}">${fmt(e.r1w)}</span></div>
    <div class="re-sub"><span class="re-mkt">${mkt}</span> · ${why}</div>
  </div>`;
}

function renderWeeks() {
  const ws = THESES.weeks || [];
  document.getElementById("weeks").innerHTML = ws.map((w, i) =>
    `<button class="${i === curWeek ? "active" : ""}" onclick="setWeek(${i})">${w.week}</button>`).join("")
    + `<button id="krtoggle" class="${showKr ? "kr-on" : ""}" onclick="toggleKr()">한국 ETF ${showKr ? "ON" : "보기"}</button>`;
}
function toggleKr() { showKr = !showKr; try { localStorage.setItem("showKr", showKr ? "1" : ""); } catch (e) {} renderWeeks(); renderBoard(); }
function setWeek(i) { curWeek = i; renderWeeks(); renderBoard(); }
function renderBoard() {
  const w = (THESES.weeks || [])[curWeek];
  if (!w) return;
  const url = reviewUrl(w);
  document.getElementById("updated").innerHTML = `${w.week} 기준${PRICE_UPDATED ? " · 시세 " + PRICE_UPDATED : ""} · 출처: `
    + (url
      ? `<a class="src-link" href="${url}" target="_blank" rel="noopener">주간복기 ${w.week} 원문 보기 →</a>`
      : `주간복기 ${w.week}`);
  document.getElementById("board").innerHTML = (w.theses || []).map((t, i) => {
    const cards = (t.tickers || []).map(tk => byTicker(tk)).filter(Boolean).map(card).join("");
    const krCards = showKr ? (t.kr || []).map(tk => byTicker(tk)).filter(Boolean).map(card).join("") : "";
    const krBlock = krCards
      ? `<div class="kr-label">한국 ETF</div><div class="grid">${krCards}</div>` : "";
    const rel = relatedEtfs(t);
    const relBlock = rel.length
      ? `<div class="rel-label">관련 ETF <span class="rel-hint">테마·구성종목 자동매칭</span></div>
         <div class="rel-grid">${rel.map(relCard).join("")}</div>` : "";
    return `<section class="thesis">
      <div class="th-head"><span class="th-num">테제 ${i + 1}</span><h2>${t.title}</h2></div>
      <div class="th-summary">${t.summary}</div>
      <div class="grid">${cards || `<div style="color:var(--muted);font-size:13px">매칭 종목이 메가캡 명단(글로벌 TOP300)에 없습니다.</div>`}</div>
      ${krBlock}
      ${relBlock}
    </section>`;
  }).join("");
}

function renderModal() {
  const s = byTicker(modalTicker); if (!s) return;
  const per = (s.pe_now || s.pe_next)
    ? `<span class="chip per">선행PER ${s.pe_now ? "올해 " + s.pe_now : ""}${s.pe_now && s.pe_next ? " → " : ""}${s.pe_next ? "내년 " + s.pe_next : ""}</span>` : "";
  document.getElementById("modal").innerHTML = `
    <div class="modal-head"><h3>${s.name} <span style="color:var(--muted);font-size:14px">${s.ticker.replace(".KS", "")} · ${s.is_etf ? (s.ticker.endsWith(".KS") ? "한국 ETF" : "미국 ETF") + (s.theme ? " · " + s.theme : "") : (s.sector || "")}${s.rank ? " · 시총 " + s.rank + "위" : ""}</span></h3>
      <span class="px">${fmtPx(s.price, s.ccy)}</span><span class="${cls(s.r1d)}" style="font-weight:700">${fmt(s.r1d)}</span>
      <button class="cap-btn" onclick="captureChart()" title="차트를 클립보드에 복사">복사</button>
      <button class="close" onclick="closeModal()">✕</button></div>
    <div class="modal-chips">
      <span class="chip">1주 <b class="${cls(s.r1w)}">${fmt(s.r1w)}</b></span>
      <span class="chip">1개월 <b class="${cls(s.r1m)}">${fmt(s.r1m)}</b></span>
      <span class="chip">3개월 <b class="${cls(s.r3m)}">${fmt(s.r3m)}</b></span>
      <span class="chip">YTD <b class="${cls(s.ytd)}">${fmt(s.ytd)}</b></span>
      <span class="chip">52주고점대비 <b class="${cls(s.from_high)}">${fmt(s.from_high)}</b></span>
      ${s.mcap_b ? `<span class="chip">시총 <b>$${(s.mcap_b / 1000).toFixed(2)}T</b></span>` : ""}${per}
    </div>
    <div class="tabs">${WINDOWS.map(w => `<button class="${w.d === modalWin ? "active" : ""}" onclick="setModalWin(${w.d})">${w.l}</button>`).join("")}</div>
    ${candleSVG(s, modalWin + 1)}
    ${newsHTML(s)}`;
}

function indexStocks(d) { (d.stocks || []).forEach(s => { STOCKS[s.ticker] = s; }); }
function indexEtfs(d) { (d && d.etfs || []).forEach(s => { STOCKS[s.ticker] = s; }); }
// 테마 토글 시 다시 그린다
window.__rerender = function () {
  if (!THESES || !THESES.weeks) return;
  renderWeeks();
  renderBoard();
  if (modalTicker && document.getElementById("modal-bg").classList.contains("open")) renderModal();
};
function boot(mega, theses, kr, dash) {
  STOCKS = {}; ETF_CANDIDATES = [];
  if (mega) { indexStocks(mega); PRICE_UPDATED = mega.updated || PRICE_UPDATED; }
  if (kr) indexEtfs(kr);
  if (dash) indexDashEtfs(dash);
  THESES = theses;
  if (!THESES || !THESES.weeks) return;
  curWeek = 0;
  renderWeeks();
  renderBoard();
}
Promise.all([
  fetch("megacap.json?t=" + Date.now()).then(r => r.json()),
  fetch("theses.json?t=" + Date.now()).then(r => r.json()),
  fetch("kr_etf.json?t=" + Date.now()).then(r => r.json()).catch(() => null),
  fetch("data.json?t=" + Date.now()).then(r => r.json()).catch(() => null),
]).then(([mega, theses, kr, dash]) => boot(mega, theses, kr, dash))
  .catch(() => { const b = document.getElementById("board"); if (b) b.innerHTML = `<p style="color:var(--down)">데이터를 불러올 수 없습니다.</p>`; });
</script>
</body>
</html>
