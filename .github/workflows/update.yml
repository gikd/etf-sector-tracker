name: 일일 데이터 갱신

on:
  schedule:
    # === 한국장 마감(15:30 KST = 06:30 UTC) 직후 === (백업 포함, 누락 방지)
    - cron: "50 6 * * 1-5"    # 마감 +20분 (15:50 KST)
    - cron: "20 7 * * 1-5"    # 백업 (16:20 KST)
    # === 미국장 마감(16:00 ET) 직후 === ET는 DST로 여름 UTC-4 / 겨울 UTC-5
    - cron: "20 20 * * 1-5"   # 여름(EDT) 마감 +20분 (16:20 ET)
    - cron: "50 20 * * 1-5"   # 여름 백업
    - cron: "20 21 * * 1-5"   # 겨울(EST) 마감 +20분 / 여름 추가 백업
    - cron: "50 21 * * 1-5"   # 겨울 백업
  workflow_dispatch:

permissions:
  contents: write

# 백업 스케줄이 겹쳐도 서로 충돌하지 않도록 직렬화(앞 실행 끝날 때까지 대기)
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 fetch_data.py
      - name: 메가캡 수집
        run: python3 fetch_megacap.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "etf-bot"
          git config user.email "actions@github.com"
          git add docs/data.json docs/data.js docs/megacap.json docs/megacap.js
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"; exit 0
          fi
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC 갱신"
          git pull --rebase -X ours origin main
          git push
