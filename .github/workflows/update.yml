name: 일일 데이터 갱신

on:
  schedule:
    # 한국·미국 장 시작/마감 시점에 갱신 (KST=UTC+9 고정, ET=DST로 여름 UTC-4 / 겨울 UTC-5)
    - cron: "5 0 * * 1-5"     # 한국 개장 09:00 KST (00:00 UTC)
    - cron: "40 6 * * 1-5"    # 한국 마감 15:30 KST (06:30 UTC) +10분
    - cron: "40 13 * * 1-5"   # 미국 개장 09:30 EDT(여름) (13:30 UTC)
    - cron: "40 14 * * 1-5"   # 미국 개장 09:30 EST(겨울) (14:30 UTC)
    - cron: "10 20 * * 1-5"   # 미국 마감 16:00 EDT(여름) (20:00 UTC) +10분
    - cron: "10 21 * * 1-5"   # 미국 마감 16:00 EST(겨울) (21:00 UTC) +10분
  workflow_dispatch:

permissions:
  contents: write

# 백업 스케줄이 겹쳐도 서로 충돌하지 않도록 직렬화(앞 실행 끝날 때까지 대기)
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 fetch_data.py
      - name: 메가캡 수집
        run: python3 fetch_megacap.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "etf-bot"
          git config user.email "actions@github.com"
          git add docs/data.json docs/data.js docs/megacap.json docs/megacap.js
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"; exit 0
          fi
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC 갱신"
          git pull --rebase -X ours origin main
          git push
