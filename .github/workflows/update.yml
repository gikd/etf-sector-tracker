name: 일일 데이터 갱신

on:
  schedule:
    # 매일 22:30 UTC = 미국 장 마감(16:00 ET) 이후 / 한국시간 오전 7:30
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 fetch_data.py
      - name: 워치리스트(개별 종목) 수집
        run: python3 fetch_watchlist.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "etf-bot"
          git config user.email "actions@github.com"
          git add docs/data.json docs/data.js docs/watchlist.json docs/watchlist.js
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d) 갱신"
          git push
