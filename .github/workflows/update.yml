name: 일일 데이터 갱신

on:
  schedule:
    # GitHub 스케줄러는 정시 보장이 안 되고 수십분~수시간 지연·누락됨.
    # 그래서 '특정 시각'이 아니라 '장중 30분마다' 돌려 개장·마감 시점이 항상 잡히고
    # 데이터가 30분 이내로 최신 유지되게 함. (공개 저장소라 Actions 무료·무제한)
    - cron: "*/30 0-6 * * 1-5"     # 한국장 09:00~15:30 KST (00:00~06:30 UTC)
    - cron: "*/30 13-21 * * 1-5"   # 미국장 09:30~16:00 ET (여름 13:30~20:00 / 겨울 14:30~21:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

# 백업 스케줄이 겹쳐도 서로 충돌하지 않도록 직렬화(앞 실행 끝날 때까지 대기)
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 fetch_data.py
      - name: 메가캡 수집
        run: python3 fetch_megacap.py
      - name: 한국 ETF 수집
        run: python3 fetch_kr_etf.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "etf-bot"
          git config user.email "actions@github.com"
          git add docs/data.json docs/data.js docs/megacap.json docs/megacap.js docs/kr_etf.json docs/kr_etf.js
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"; exit 0
          fi
          git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC 갱신"
          git pull --rebase -X ours origin main
          git push
