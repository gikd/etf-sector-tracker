name: 일일 데이터 갱신

on:
  schedule:
    # 실제 정시 갱신은 Cloudflare Worker(trigger/)가 workflow_dispatch 로 담당한다
    # (장중 매시간 + 개장/마감). GitHub 스케줄러는 지연·누락이 심해서 '백업'으로만,
    # 장 시간대 매시 23분(비정시)에 최대한 잡히게 한다. (공개 저장소라 Actions 무료)
    - cron: "23 0-6 * * 1-5"     # 한국장 09:00~15:30 KST (00:00~06:30 UTC) 백업
    - cron: "23 13-21 * * 1-5"   # 미국장 (여름 13:30~20:00 / 겨울 14:30~21:00 UTC) 백업
  workflow_dispatch:

permissions:
  contents: write

# 백업 스케줄이 겹쳐도 서로 충돌하지 않도록 직렬화(앞 실행 끝날 때까지 대기)
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 fetch_data.py
      - name: 메가캡 수집
        run: python3 fetch_megacap.py
      - name: 한국 ETF 수집
        run: python3 fetch_kr_etf.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "etf-bot"
          git config user.email "actions@github.com"
          git add docs/data.json docs/data.js docs/megacap.json docs/megacap.js docs/kr_etf.json docs/kr_etf.js
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"; exit 0
          fi
          git commit -m "data: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M') KST 갱신"
          git pull --rebase -X ours origin main
          git push
