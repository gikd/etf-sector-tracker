name: 일일 데이터 갱신

on:
  schedule:
    # 미국 장 마감(16:00 ET) 직후. ET는 DST로 여름 UTC-4 / 겨울 UTC-5 → 두 시각 모두 등록.
    - cron: "20 20 * * 1-5"   # 여름(EDT): 16:00 ET = 20:00 UTC + 20분
    - cron: "20 21 * * 1-5"   # 겨울(EST): 16:00 ET = 21:00 UTC + 20분
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 fetch_data.py
      - name: 메가캡 수집
        run: python3 fetch_megacap.py
      - name: 커밋 & 푸시
        run: |
          git config user.name "etf-bot"
          git config user.email "actions@github.com"
          git add docs/data.json docs/data.js docs/megacap.json docs/megacap.js
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d) 갱신"
          git push
